<html>
<head>
    <style>
        html, body {
            padding: 0; 
            margin: 0;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div style="width: 100%; background: white; font-family: Inter, sans-serif;">

        <!-- NAVBAR (Full width background + centered content) -->
        <!-- NAVBAR -->
<div style="width: 100%; background: #B65353; border-bottom: 1px solid #D9D9D9;">

    <div style="
        max-width: 1200px;
        margin: auto;
        padding: 32px 24px;
        display: flex;
        align-items: center;
        gap: 24px;
        flex-wrap: wrap;
    ">

        <!-- Logo -->
        <div style="display: flex; gap: 4px;">
            <div style="display: flex; flex-direction: column; align-items: flex-end;">
                <div style="font-size: 24px; font-weight: 700;">DLTA</div>
                <div style="font-size: 12px;">Innovation</div>
            </div>
        </div>

        <!-- Links (flex grow pushes them right) -->
        <div style="
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        ">

            <!-- Active Link -->
            <div style="
                padding: 8px 12px;
                background: #F5F5F5;
                border-radius: 8px;
                font-size: 16px;
                cursor: pointer;
            ">
                Products
            </div>

            <!-- Default Links -->
            <div style="padding: 8px 12px; border-radius: 8px; font-size: 16px; cursor: pointer;">
                Solutions
            </div>

            <div style="padding: 8px 12px; border-radius: 8px; font-size: 16px; cursor: pointer;">
                Community
            </div>

            <div style="padding: 8px 12px; border-radius: 8px; font-size: 16px; cursor: pointer;">
                Resources
            </div>

            <div style="padding: 8px 12px; border-radius: 8px; font-size: 16px; cursor: pointer;">
                Pricing
            </div>

            <div style="padding: 8px 12px; border-radius: 8px; font-size: 16px; cursor: pointer;">
                Contact
            </div>

            <div style="padding: 8px 12px; border-radius: 8px; font-size: 16px; cursor: pointer;">
                Link
            </div>

        </div>

        <!-- Right CTA -->
        <div style="
            padding: 8px 16px;
            background: #2C2C2C;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        ">
            Register
        </div>

    </div>

</div>




        <!-- LOGIN SECTION -->
        <div style="padding: 120px 5%; display: flex; justify-content: center;">

            <div style="width: 100%; max-width: 600px;">

                <div style="text-align: center; font-size: clamp(40px, 5vw, 72px); font-weight: 700; margin-bottom: 40px;">
                    Login
                </div>

                <!-- Email -->
                <div style="margin-bottom: 24px;">
                    <label style="font-size: 14px;">Email Address</label>
                    <input type="email"
                        style="width: 100%; height: 48px; margin-top: 8px; padding: 12px 16px; background: #F2F4F8; border: none; border-bottom: 1px solid #C1C7CD; font-size: 16px;">
                </div>

                <!-- Password -->
                <div style="margin-bottom: 24px;">
                    <label style="font-size: 14px;">Password</label>
                    <input type="password"
                        style="width: 100%; height: 48px; margin-top: 8px; padding: 12px 16px; background: #F2F4F8; border: none; border-bottom: 1px solid #C1C7CD; font-size: 16px;">
                </div>

                <!-- Remember + Forgot -->
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 14px;">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <div style="color: #001D6C;">Forgot Password?</div>
                </div>

                <!-- Login Button -->
                <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
                    <button
                        style="padding: 12px 32px; background: #121619; color: white; border-radius: 8px; border: none; font-size: 16px;">
                        Login
                    </button>
                </div>

                <div style="text-align: center; font-size: 14px; color: #21272A;">
                    Vestibulum faucibus odio vitae arcu auctor lectus.
                </div>

            </div>
        </div>



        <!-- FOOTER -->
        <div style="width: 100%; background: #862424; padding: 60px 5%; color: white;">

            <div
                style="max-width: 1200px; margin: auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 32px; align-items: center;">

                <!-- Left Links -->
                <div style="display: flex; gap: 24px; flex-wrap: wrap;">
                    <div>Eleven</div>
                    <div>Twelve</div>
                    <div>Thirteen</div>
                </div>

                <!-- Logo -->
                <div style="text-align: center;">
                    <div style="font-size: 24px; font-weight: 700; color: #C1C7CD;"></div>
                    <div style="font-size: 12px; color: #C1C7CD;">Innovation</div>
                </div>

                <!-- Social placeholders -->
                <div style="display: flex; gap: 16px;">
                    <div>◯</div>
                    <div>◯</div>
                    <div>◯</div>
                    <div>◯</div>
                    <div>◯</div>
                </div>

            </div>

            <div style="text-align: center; margin-top: 40px; font-size: 14px;">
                DLTA Innovation LLC. © 2026. All rights reserved.
            </div>

        </div>

    </div>
</body>

</html>
